version: '3.8'

name: multi-agent-system

services:
  # ============================================
  # Frontend - Next.js Application
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_AUTH_SERVICE_URL=/auth
        - NEXT_PUBLIC_OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_BASE_URL:-}
    container_name: multi-agent-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_AUTH_SERVICE_URL=/auth
      - NEXT_PUBLIC_OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_BASE_URL:-}
      - SECRETS_MANAGER_URL=http://secrets-manager:8092
    restart: unless-stopped
    depends_on:
      - secrets-manager
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=frontend"
      - "com.multi-agent.version=0.1.0"

  # ============================================
  # Agent Router - Main API Gateway
  # ============================================
  agent-router:
    build:
      context: ./agent-router
      dockerfile: Dockerfile
    container_name: agent-router
    expose:
      - "8000"
    environment:
      # Encoder Configuration
      - ENCODER_PROVIDER=${ENCODER_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENCODER_MODEL=${ENCODER_MODEL:-text-embedding-3-small}
      - ENCODER_BASE_URL=${ENCODER_BASE_URL:-}
      - ENCODER_API_KEY=${ENCODER_API_KEY:-${OPENAI_API_KEY}}

      # Router Configuration
      - ROUTER_THRESHOLD=${ROUTER_THRESHOLD:-0.6}
      - ROUTER_AUTO_SYNC=${ROUTER_AUTO_SYNC:-local}
      - ROUTER_CACHE_ENABLED=${ROUTER_CACHE_ENABLED:-true}
      - ROUTER_FALLBACK_ROUTE=${ROUTER_FALLBACK_ROUTE:-general-chatbot}

      # LLM Fallback Configuration
      - ENABLE_LLM_FALLBACK=${ENABLE_LLM_FALLBACK:-true}
      - LLM_FALLBACK_THRESHOLD=${LLM_FALLBACK_THRESHOLD:-0.6}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY:-${OPENAI_API_KEY}}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - MAX_LLM_FALLBACK_PER_MINUTE=${MAX_LLM_FALLBACK_PER_MINUTE:-100}
      - CACHE_LLM_DECISIONS=${CACHE_LLM_DECISIONS:-true}

      # Service Configuration
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}

      # Deploy-time config
      - DEPLOY_MULTI_AGENT_CONFIG_PATH=${DEPLOY_MULTI_AGENT_CONFIG_PATH:-}

      # Authentication Settings
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_JWT_SECRET_KEY=${AUTH_JWT_SECRET_KEY:-change-this-secret-key-in-production-min-32-chars}
      - AUTH_JWT_ALGORITHM=${AUTH_JWT_ALGORITHM:-HS256}
      - AUTH_SERVICE_URL=http://auth-service:8001
      - AUTH_USE_REMOTE_VERIFICATION=${AUTH_USE_REMOTE_VERIFICATION:-false}

      # Security
      - API_KEY_REQUIRED=${API_KEY_REQUIRED:-false}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-1000}

      # MongoDB (conversation history)
      - MONGO_ENABLED=${MONGO_ENABLED:-true}
      - MONGO_URI=mongodb://router-mongo:27017
      - MONGO_DATABASE=${MONGO_DATABASE:-agent_router}
      - MONGO_COLLECTION=${MONGO_COLLECTION:-conversation_messages}

      # Semantic cache (Redis-backed)
      - SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED:-true}
      - SEMANTIC_CACHE_REDIS_URL=redis://router-redis:6379/0
      - SEMANTIC_CACHE_THRESHOLD=${SEMANTIC_CACHE_THRESHOLD:-0.95}
      - SEMANTIC_CACHE_MAX_SIZE=${SEMANTIC_CACHE_MAX_SIZE:-1000}
    volumes:
      - ./agent-router/data:/app/data
      - ./agent-router/config:/app/config
      - ./agent-router/logs:/app/logs
    restart: unless-stopped
    depends_on:
      router-redis:
        condition: service_healthy
      router-mongo:
        condition: service_healthy
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=router"

  # ============================================
  # Auth Service - Authentication & Authorization
  # ============================================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    expose:
      - "8001"
    environment:
      - AUTH_SERVICE_HOST=0.0.0.0
      - AUTH_SERVICE_PORT=8001
      - MONGO_URI=mongodb://auth-mongo:27017
      - MONGO_DATABASE=auth_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-secret-key-in-production-min-32-chars}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - PASSWORD_MIN_LENGTH=8
      - REQUIRE_EMAIL_VERIFICATION=false
      - CORS_ORIGINS=http://localhost:3000,http://localhost
    restart: unless-stopped
    depends_on:
      auth-mongo:
        condition: service_healthy
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=auth"

  # ============================================
  # Secrets Manager - Secure Credential Storage
  # ============================================
  secrets-manager:
    build:
      context: ./secrets-manager
      dockerfile: Dockerfile
    container_name: secrets-manager
    expose:
      - "8092"
    environment:
      - PYTHONPATH=/app
      - MONGODB_URL=mongodb://secrets-mongo:27017
      - MONGODB_DATABASE=secrets_manager
      - MONGODB_COLLECTION=secrets
      - SECRETS_MANAGER_API_KEY=${SECRETS_MANAGER_API_KEY:-}
      - SECRETS_ENCRYPTION_KEY=${SECRETS_ENCRYPTION_KEY:-}
      # OAuth2 Configuration
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      secrets-mongo:
        condition: service_healthy
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=secrets"

  # ============================================
  # Tool Executor - Execute Agent Tools
  # ============================================
  tool-executor:
    build:
      context: ./tool-executor
      dockerfile: Dockerfile
    container_name: tool-executor
    expose:
      - "8090"
    environment:
      - PYTHONPATH=/app
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8090
      - SECRETS_MANAGER_URL=http://secrets-manager:8092
      - SECRETS_MANAGER_API_KEY=${SECRETS_MANAGER_API_KEY:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - secrets-manager
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=tools"

  # ============================================
  # MongoDB - Router Database
  # ============================================
  router-mongo:
    image: mongo:7
    container_name: router-mongo
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=agent_router
    volumes:
      - router-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=database"

  # ============================================
  # MongoDB - Auth Database
  # ============================================
  auth-mongo:
    image: mongo:7
    container_name: auth-mongo
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=auth_db
    volumes:
      - auth-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=database"

  # ============================================
  # MongoDB - Secrets Manager Database
  # ============================================
  secrets-mongo:
    image: mongo:7
    container_name: secrets-mongo
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=secrets_manager
    volumes:
      - secrets-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=database"

  # ============================================
  # Redis - Semantic Cache
  # ============================================
  router-redis:
    image: redis:7-alpine
    container_name: router-redis
    expose:
      - "6379"
    volumes:
      - router-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - multi-agent-network
    command: redis-server --appendonly yes
    labels:
      - "com.multi-agent.service=cache"

  # ============================================
  # Redis - Agents Shared Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: agents-redis
    expose:
      - "6379"
    volumes:
      - agents-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - multi-agent-network
    command: redis-server --appendonly yes
    labels:
      - "com.multi-agent.service=cache"

  # ============================================
  # Nginx - Reverse Proxy (Production)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: multi-agent-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - agent-router
      - auth-service
    networks:
      - multi-agent-network
    labels:
      - "com.multi-agent.service=proxy"

# ============================================
# Networks
# ============================================
networks:
  multi-agent-network:
    external: true
    name: myvng-multi-agent

# ============================================
# Volumes
# ============================================
volumes:
  router-mongo-data:
    driver: local
  auth-mongo-data:
    driver: local
  secrets-mongo-data:
    driver: local
  router-redis-data:
    driver: local
  agents-redis-data:
    driver: local
