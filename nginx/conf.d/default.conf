# HTTP Server Configuration
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Uncomment for HTTPS redirect in production
    # return 301 https://$server_name$request_uri;

    # ============================================
    # Agent Router API - /api/*
    # ============================================
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        # Remove /api prefix when forwarding to backend
        rewrite ^/api/(.*) /$1 break;

        proxy_pass http://agent_router;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Websocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for SSE/streaming
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Buffering (disable for SSE)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # CORS headers (if needed)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Max-Age 3600 always;

        # Handle OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ============================================
    # Auth Service API - /auth/*
    # ============================================
    location /auth/ {
        # Rate limiting (stricter for auth)
        limit_req zone=auth_limit burst=10 nodelay;

        # Remove /auth prefix when forwarding to backend
        rewrite ^/auth/(.*) /$1 break;

        proxy_pass http://auth_service;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Max-Age 3600 always;

        # Handle OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ============================================
    # Health Check Endpoints (bypass rate limits)
    # ============================================
    location /api/health {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://agent_router;
        access_log off;
    }

    location /auth/health {
        rewrite ^/auth/(.*) /$1 break;
        proxy_pass http://auth_service;
        access_log off;
    }

    # ============================================
    # Frontend - Next.js Application
    # ============================================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Next.js static files caching
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 60m;
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    # ============================================
    # Security
    # ============================================
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

