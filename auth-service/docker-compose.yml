name: "multi-agent"
services:
  auth-service:
    build: .
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      - AUTH_SERVICE_HOST=0.0.0.0
      - AUTH_SERVICE_PORT=8001
      - MONGO_URI=mongodb://secrets-manager-mongodb:27017
      - MONGO_DATABASE=auth_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-secret-key-in-production-min-32-chars}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - PASSWORD_MIN_LENGTH=8
      - REQUIRE_EMAIL_VERIFICATION=false
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    networks:
      - myvng-multi-agent

networks:
  myvng-multi-agent:
    external: true
